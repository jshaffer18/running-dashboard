function fmtPace(sec) {
  if (sec == null || !isFinite(sec)) return "\u2014";
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return m + ":" + String(s).padStart(2, "0");
}

function fmtDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return m + ":" + String(s).padStart(2, "0");
}

function fmtDate(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function fmtDateShort(iso) {

function projectRoute(route, size) {
  if (!route || route.length === 0) return "";
  const lats = route.map((p) => p[0]);
  const lons = route.map((p) => p[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const avgLat = (minLat + maxLat) / 2;
  const cosLat = Math.cos((avgLat * Math.PI) / 180);
  const w = (maxLon - minLon) * cosLat;
  const h = maxLat - minLat;
  const span = Math.max(w, h, 0.0001);
  const pad = size * 0.12;
  const scale = (size - pad * 2) / span;
  const offX = (size - w * scale) / 2;
  const offY = (size - h * scale) / 2;
  return route
    .map((p) => {
      const x = (p[1] - minLon) * cosLat * scale + offX;
      const y = size - ((p[0] - minLat) * scale + offY);
      return x.toFixed(1) + "," + y.toFixed(1);
    })
    .join(" ");
}

function RouteSvg({ route, color }) {
  if (!route) {

        No GPS data
      </div>
    );
  }
  const points = projectRoute(route, 100);
  return (
    <svg viewBox="0 0 100 100" width="100" height="100" style={{ background: "var(--surface-1)", borderRadius: 10 }}>
      <polyline points={points} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={points.split(" ")[0].split(",")[0]} cy={points.split(" ")[0].split(",")[1]} r="2.5" fill={color} />
    </svg>
  );
}

function CalendarMonth({ monthDate, setMonthDate }) {
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const first = new Date(year, month, 1);
  const startDow = (first.getDay() + 6) % 7; // Monday = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthLabel = monthDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  function dayISO(d) {
    return year + "-" + String(month + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <button onClick={() => setMonthDate(new Date(year, month - 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "var(--text-secondary)" }}>
          <i className="ti ti-chevron-left" style={{ fontSize: 18 }}></i>
        </button>
        <p style={{ fontSize: 13, fontWeight: 500, margin: 0 }}>{monthLabel}</p>
        <button onClick={() => setMonthDate(new Date(year, month + 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "var(--text-secondary)" }}>
          <i className="ti ti-chevron-right" style={{ fontSize: 18 }}></i>
        </button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
        {["M", "T", "W", "T", "F", "S", "S"].map((d, i) => (
          <div key={i} style={{ textAlign: "center", fontSize: 10, color: "var(--text-secondary)", fontWeight: 500 }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const iso = dayISO(d);
          const run = runForDate(iso);
          const c = run ? TYPE_COLOR[run.type] || TYPE_COLOR.Easy : null;
          return (
            <div
              key={i}
              title={run ? run.type + ": " + run.distance_mi + " mi" : ""}
              style={{
                aspectRatio: "1",
                borderRadius: 7,
                background: c ? c.solid : "var(--surface-1)",
                color: c ? "#3D3428" : "var(--text-secondary)",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: 11,
                fontWeight: c ? 600 : 400,
              }}
            >
              {d}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12, fontSize: 11, color: "var(--text-secondary)" }}>
        {Object.entries(TYPE_COLOR).filter(([k]) => k !== "Rest").map(([k, v]) => (

      type, miles: Math.round(miles * 100) / 100, color: (TYPE_COLOR[type] || TYPE_COLOR.Easy).solid,
    }));
  }, []);

  const weeklyData = useMemo(() => {
    const map = {};
    RUNS.forEach((r) => {
      const d = new Date(r.date + "T12:00:00");
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d);
      monday.setDate(diff);
      const key = monday.toISOString().slice(0, 10);
      if (!map[key]) map[key] = 0;
      map[key] += r.distance_mi;
    });
    return Object.entries(map).sort((a, b) => (a[0] > b[0] ? 1 : -1)).map(([wk, mi]) => ({ week: fmtDate(wk), miles: Math.round(mi * 100) / 100 }));
  }, []);

  const planVsActualByWeek = useMemo(() => {
    return PLAN.map((w) => {
      const plannedTotal = w.days.reduce((a, d) => a + (d.planned ? d.planned.distance : 0), 0);
      const actualTotal = w.days.reduce((a, d) => { const r = runForDate(d.date); return a + (r ? r.distance_mi : 0); }, 0);
      return { weekLabel: w.weekLabel, weekStart: w.weekStart, planned: Math.round(plannedTotal * 100) / 100, actual: Math.round(actualTotal * 100) / 100 };
    });
  }, []);

  const trendsByType = useMemo(() => {
    const map = {};
    RUNS.forEach((r) => {
      if (!map[r.type]) map[r.type] = [];
      const isHill = r.type === "Hill" && r.repeat_avg_pace_sec_per_mi;
      map[r.type].push({
        date: r.date,
        dateLabel: fmtDateShort(r.date),
        pace: isHill ? r.repeat_avg_pace_sec_per_mi : r.duration_s / r.distance_mi,
        hr: isHill ? r.repeat_avg_hr : r.avg_hr,
        distance: r.distance_mi,
        repLength: isHill ? r.repeat_avg_distance_mi : null,
        repTime: isHill ? r.repeat_avg_time_s : null,
        repElev: isHill ? r.repeat_avg_elev_gain_ft : null,
        repCount: isHill ? r.repeat_count : null,
      });
    });
    Object.values(map).forEach((arr) => arr.sort((a, b) => (a.date > b.date ? 1 : -1)));
    return map;
  }, []);

  const tabs = [
    { id: "overview", label: "Overview", icon: "ti-layout-dashboard" },
    { id: "splits", label: "Splits", icon: "ti-chart-bar" },
    { id: "weekly", label: "Weekly plan vs actual", icon: "ti-calendar-stats" },
    { id: "trends", label: "Trends", icon: "ti-trending-up" },
    { id: "gear", label: "Gear", icon: "ti-shoe" },
  ];

  return (
    <div style={{ fontFamily: "var(--font-sans)" }}>

      </h2>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 20 }}>

        <KpiCard gradient={KPI_GRADIENTS.time} icon="ti-clock" label="Total time" value={Math.floor(totalTime / 60) + " min"} sub={fmtDuration(totalTime / RUNS.length) + " avg /run"} />
        <KpiCard gradient={KPI_GRADIENTS.hr} icon="ti-heart" label="Avg heart rate" value={avgHrOverall + " bpm"} sub="across all runs" />
        <KpiCard gradient={KPI_GRADIENTS.runs} icon="ti-mountain" label="Elev gain" value={RUNS.reduce((a, r) => a + r.elev_gain_ft, 0) + " ft"} sub="total climbed" />
      </div>

      <div style={{ display: "flex", gap: 4, borderBottom: "0.5px solid var(--border)", marginBottom: 20, flexWrap: "wrap" }}>
        {tabs.map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              background: "none", border: "none",
              borderBottom: tab === t.id ? "2px solid var(--text-primary)" : "2px solid transparent",
              padding: "8px 14px", fontSize: 14, fontWeight: tab === t.id ? 500 : 400,
              color: tab === t.id ? "var(--text-primary)" : "var(--text-secondary)",
              cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
            }}
          >
            <i className={"ti " + t.icon} style={{ fontSize: 16 }} aria-hidden="true"></i>
            {t.label}
          </button>

      </div>

      {tab === "overview" && (

                <div style={{ height: 140, display: "flex", alignItems: "center" }}>
                  <ResponsiveContainer width="55%" height="100%">
                    <PieChart>
                      <Pie data={typeBreakdown} dataKey="miles" nameKey="type" innerRadius={35} outerRadius={58} paddingAngle={3} strokeWidth={0}>
                        {typeBreakdown.map((entry, i) => (<Cell key={i} fill={entry.color} />))}
                      </Pie>
                      <Tooltip contentStyle={{ background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: 8, fontSize: 13 }} formatter={(value, name) => [value + " mi", name]} />
                    </PieChart>
                  </ResponsiveContainer>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {typeBreakdown.map((t, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>

                        <span style={{ color: "var(--text-secondary)" }}>{t.type}</span>
                        <span style={{ fontWeight: 500 }}>{t.miles} mi</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div style={{ background: "var(--surface-1)", borderRadius: 16, padding: "1rem 1.2rem" }}>
                <p style={{ fontSize: 13, fontWeight: 500, color: "var(--text-secondary)", margin: "0 0 12px" }}>This week</p>
                <p style={{ fontSize: 28, fontWeight: 700, margin: "0 0 2px", letterSpacing: -0.5 }}>

                <p style={{ fontSize: 12, color: "var(--text-secondary)", margin: "0 0 12px" }}>actual vs. planned</p>

                </div>

                  <Bar dataKey="miles" fill="#BDD1C5" radius={[4, 4, 0, 0]} barSize={48} />

                <button key={r.date} onClick={() => setTab("splits")} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: 12, padding: "12px 16px", cursor: "pointer", textAlign: "left" }}>

                    <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>

                      <p style={{ margin: "4px 0 0", fontSize: 12, color: c.text }}>

                      </p>

                  </div>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                    <RouteSvg route={r.route} color={c.solid} />
                  </div>
                </div>

                <p style={{ fontSize: 11, color: "var(--text-secondary)", margin: "0 0 4px" }}>Elevation, pace, HR by mile</p>
                <p style={{ fontSize: 10, color: "var(--text-secondary)", margin: "0 0 4px" }}>Left axis: elevation (ft) &middot; Right axis: pace (min/mi) &middot; HR via tooltip</p>
                <div style={{ height: 190 }}>
                  <ResponsiveContainer width="100%" height="100%">
                    <ComposedChart data={r.detail_trace} margin={{ top: 4, right: 4, left: 0, bottom: 0 }}>
                      <XAxis dataKey="dist_mi" tickFormatter={(v) => v.toFixed(1)} tick={{ fontSize: 10, fill: "var(--text-secondary)" }} axisLine={{ stroke: "var(--border)" }} tickLine={false} />
                      <YAxis yAxisId="elev" orientation="left" domain={["dataMin - 8", "dataMax + 60"]} tick={{ fontSize: 9, fill: "#8FA88F" }} axisLine={false} tickLine={false} width={30} tickFormatter={(v) => Math.round(v)} />
                      <YAxis yAxisId="hr" hide domain={[100, 220]} />
                      <YAxis yAxisId="pace" orientation="right" reversed domain={["dataMin - 20", "dataMax + 200"]} tick={{ fontSize: 9, fill: "#77807A" }} axisLine={false} tickLine={false} width={40} tickFormatter={fmtPace} />
                      <Tooltip
                        contentStyle={{ background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: 8, fontSize: 12 }}
                        formatter={(value, name) => {
                          if (name === "elev_ft") return [Math.round(value) + " ft", "Elevation"];
                          if (name === "pace") return [fmtPace(value) + "/mi", "Pace"];
                          if (name === "hr") return [value + " bpm", "HR"];
                          return [value, name];
                        }}
                        labelFormatter={(v) => v.toFixed(2) + " mi"}
                      />
                      <Area yAxisId="elev" type="monotone" dataKey="elev_ft" stroke="#BDD1C5" fill="#BDD1C5" fillOpacity={0.25} strokeWidth={1.2} />
                      <Line yAxisId="pace" type="monotone" dataKey="pace" stroke="#9DAAA2" strokeWidth={1.5} dot={false} connectNulls />
                      <Line yAxisId="hr" type="monotone" dataKey="hr" stroke="#A26360" strokeWidth={1.5} dot={false} connectNulls />
                    </ComposedChart>
                  </ResponsiveContainer>
                </div>
                <div style={{ display: "flex", gap: 14, fontSize: 11, color: "var(--text-secondary)", marginTop: 4, flexWrap: "wrap" }}>
                  <span><span style={{ display: "inline-block", width: 9, height: 9, background: "#BDD1C5", borderRadius: 2, marginRight: 4, opacity: 0.5 }}></span>Elevation</span>
                  <span><span style={{ display: "inline-block", width: 9, height: 9, background: "#9DAAA2", borderRadius: 2, marginRight: 4 }}></span>Pace</span>
                  <span><span style={{ display: "inline-block", width: 9, height: 9, background: "#A26360", borderRadius: 2, marginRight: 4 }}></span>Avg HR</span>
                </div>

                {r.type === "Hill" && r.hill_reps && (
                  <div style={{ marginTop: 14 }}>
                    <p style={{ fontSize: 11, color: "var(--text-secondary)", margin: "0 0 6px" }}>Hill repeats (from watch laps; rep 1's distance/time were adjusted since the lap button was pressed late)</p>
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                        <thead>
                          <tr style={{ borderBottom: "0.5px solid var(--border)" }}>
                            <th style={{ textAlign: "left", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Rep</th>
                            <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Dist</th>
                            <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Time</th>
                            <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Pace</th>
                            <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Avg HR</th>
                            <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Elev gain</th>
                          </tr>
                        </thead>
                        <tbody>

                            <tr key={rep.rep} style={{ borderBottom: "0.5px solid var(--border)" }}>

                              <td style={{ padding: "6px 8px", textAlign: "right" }}>{Math.round(rep.time_s)}s</td>
                              <td style={{ padding: "6px 8px", textAlign: "right" }}>{fmtPace(rep.pace_sec_per_mi)}/mi</td>
                              <td style={{ padding: "6px 8px", textAlign: "right" }}>{rep.avg_hr}</td>
                              <td style={{ padding: "6px 8px", textAlign: "right" }}>{rep.elev_gain_ft} ft</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                <button

                >
                  <i className={"ti " + (expanded[r.date] ? "ti-chevron-up" : "ti-chevron-down")} style={{ fontSize: 14 }}></i>

                </button>

                {expanded[r.date] && (
                  <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 16 }}>

                  <th style={{ textAlign: "left", padding: "8px 10px", color: "var(--text-secondary)", fontWeight: 500 }}>Planned</th>
                  <th style={{ textAlign: "right", padding: "8px 10px", color: "var(--text-secondary)", fontWeight: 500 }}>Planned mi</th>
                  <th style={{ textAlign: "right", padding: "8px 10px", color: "var(--text-secondary)", fontWeight: 500 }}>Actual mi</th>
                  <th style={{ textAlign: "right", padding: "8px 10px", color: "var(--text-secondary)", fontWeight: 500 }}>Avg HR</th>
                  <th style={{ textAlign: "left", padding: "8px 10px", color: "var(--text-secondary)", fontWeight: 500 }}>Notes</th>
                </tr>
              </thead>
              <tbody>
                {week.days.map((d) => {
                  const r = runForDate(d.date);
                  const plannedMi = d.planned ? d.planned.distance : null;
                  const actualMi = r ? r.distance_mi : null;
                  let deltaColor = "var(--text-secondary)";
                  if (plannedMi != null && actualMi != null) deltaColor = Math.abs(actualMi - plannedMi) < 0.3 ? "#666C64" : "#795E4F";
                  return (
                    <tr key={d.date} style={{ borderBottom: "0.5px solid var(--border)" }}>
                      <td style={{ padding: "8px 10px", fontWeight: 500 }}>{d.day}<br/><span style={{ fontWeight: 400, color: "var(--text-secondary)", fontSize: 12 }}>{fmtDate(d.date)}</span></td>
                      <td style={{ padding: "8px 10px" }}>{d.planned ? d.planned.type : (d.note || "\u2014")}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right" }}>{plannedMi != null ? plannedMi : "\u2014"}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right", color: deltaColor, fontWeight: 500 }}>{actualMi != null ? actualMi : "\u2014"}</td>
                      <td style={{ padding: "8px 10px", textAlign: "right" }}>{r ? r.avg_hr : "\u2014"}</td>
                      <td style={{ padding: "8px 10px", color: "var(--text-secondary)" }}>{d.planned && d.note ? d.note : ""}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <p style={{ fontSize: 13, color: "var(--text-secondary)", margin: "0 0 8px" }}>Planned vs. actual, by week</p>
          <div style={{ height: 220 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={planVsActualByWeek} margin={{ top: 4, right: 8, left: 0, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false} />
                <XAxis dataKey="weekLabel" tick={{ fontSize: 12, fill: "var(--text-secondary)" }} axisLine={{ stroke: "var(--border)" }} tickLine={false} />
                <YAxis tick={{ fontSize: 12, fill: "var(--text-secondary)" }} axisLine={false} tickLine={false} width={36} />
                <Tooltip contentStyle={{ background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: 8, fontSize: 13 }} formatter={(value, name) => [value + " mi", name === "planned" ? "Planned" : "Actual"]} />
                <Legend wrapperStyle={{ fontSize: 12 }} formatter={(v) => (v === "planned" ? "Planned" : "Actual")} />
                <Bar dataKey="planned" fill="#E3C3BF" radius={[4, 4, 0, 0]} barSize={28} />
                <Bar dataKey="actual" fill="#BDD1C5" radius={[4, 4, 0, 0]} barSize={28} />
              </BarChart>
            </ResponsiveContainer>
          </div>
          <p style={{ fontSize: 12, color: "var(--text-secondary)", marginTop: 8 }}>This chart will get more useful for week-over-week comparison as more weeks are logged.</p>
        </div>
      )}

      {tab === "trends" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <p style={{ fontSize: 12, color: "var(--text-secondary)", margin: 0 }}>
            Pace and heart rate over time, by run type. For hill workouts, this uses only the detected climb-repeat segments &mdash; not the recovery jogs between them &mdash; so it's not diluted by the easy portions.
          </p>
          {Object.entries(trendsByType).map(([type, points]) => {
            const c = TYPE_COLOR[type] || TYPE_COLOR.Easy;
            return (
              <div key={type} style={{ background: "var(--surface-1)", borderRadius: 16, padding: "1rem 1.2rem" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ background: c.bg, color: c.text, fontSize: 12, padding: "3px 9px", borderRadius: 8, fontWeight: 500 }}>{type}</span>
                  <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>{points.length} run{points.length !== 1 ? "s" : ""} logged</p>
                </div>
                {type === "Hill" && (
                  <p style={{ fontSize: 11, color: "var(--text-secondary)", margin: "0 0 10px" }}>Based on the individual hill-repeat laps (not the recovery jogs between them).</p>
                )}
                {points.length < 2 ? (
                  <p style={{ fontSize: 12, color: "var(--text-secondary)", margin: 0 }}>
                    Need at least 2 runs of this type to show a trend. So far: {fmtPace(points[0].pace)}/mi at {points[0].hr} bpm on {fmtDate(points[0].date)}
                    {points[0].repLength ? ` (avg rep: ${points[0].repLength} mi, ${Math.round(points[0].repTime)}s, ${points[0].repElev} ft gain, ${points[0].repCount} reps)` : ""}.
                  </p>
                ) : (
                  <React.Fragment>
                    <p style={{ fontSize: 11, color: "var(--text-secondary)", margin: "0 0 4px" }}>Pace &amp; heart rate</p>
                    <div style={{ height: 150, marginBottom: type === "Hill" ? 14 : 0 }}>
                      <ResponsiveContainer width="100%" height="100%">
                        <ComposedChart data={points} margin={{ top: 4, right: 8, left: 0, bottom: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false} />
                          <XAxis dataKey="dateLabel" tick={{ fontSize: 11, fill: "var(--text-secondary)" }} axisLine={{ stroke: "var(--border)" }} tickLine={false} />
                          <YAxis yAxisId="pace" reversed tickFormatter={fmtPace} tick={{ fontSize: 11, fill: "var(--text-secondary)" }} axisLine={false} tickLine={false} width={42} />
                          <YAxis yAxisId="hr" orientation="right" domain={[100, 200]} tick={{ fontSize: 11, fill: "var(--text-secondary)" }} axisLine={false} tickLine={false} width={34} />
                          <Tooltip
                            contentStyle={{ background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: 8, fontSize: 12 }}
                            formatter={(value, name) => (name === "pace" ? [fmtPace(value) + "/mi", "Pace"] : [value + " bpm", "HR"])}
                          />
                          <Line yAxisId="pace" type="monotone" dataKey="pace" stroke={c.solid} strokeWidth={2} dot={{ r: 4 }} />
                          <Line yAxisId="hr" type="monotone" dataKey="hr" stroke="#A26360" strokeWidth={2} strokeDasharray="4 3" dot={{ r: 4 }} />
                        </ComposedChart>
                      </ResponsiveContainer>
                    </div>
                    {type === "Hill" && (
                      <React.Fragment>
                        <p style={{ fontSize: 11, color: "var(--text-secondary)", margin: "0 0 4px" }}>Avg rep length &amp; elevation gain</p>
                        <div style={{ height: 150 }}>
                          <ResponsiveContainer width="100%" height="100%">
                            <ComposedChart data={points} margin={{ top: 4, right: 8, left: 0, bottom: 0 }}>
                              <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false} />
                              <XAxis dataKey="dateLabel" tick={{ fontSize: 11, fill: "var(--text-secondary)" }} axisLine={{ stroke: "var(--border)" }} tickLine={false} />
                              <YAxis yAxisId="len" tick={{ fontSize: 11, fill: "var(--text-secondary)" }} axisLine={false} tickLine={false} width={42} />
                              <YAxis yAxisId="elev" orientation="right" tick={{ fontSize: 11, fill: "var(--text-secondary)" }} axisLine={false} tickLine={false} width={34} />
                              <Tooltip
                                contentStyle={{ background: "var(--surface-2)", border: "0.5px solid var(--border)", borderRadius: 8, fontSize: 12 }}
                                formatter={(value, name) => (name === "repLength" ? [value + " mi", "Avg rep length"] : [value + " ft", "Avg rep elev gain"])}
                              />
                              <Line yAxisId="len" type="monotone" dataKey="repLength" stroke="#EDCC8B" strokeWidth={2} dot={{ r: 4 }} />
                              <Line yAxisId="elev" type="monotone" dataKey="repElev" stroke="#BDD1C5" strokeWidth={2} strokeDasharray="4 3" dot={{ r: 4 }} />
                            </ComposedChart>
                          </ResponsiveContainer>
                        </div>
                      </React.Fragment>
                    )}
                  </React.Fragment>
                )}
              </div>
            );
          })}
        </div>
      )}

      {tab === "gear" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <p style={{ fontSize: 12, color: "var(--text-secondary)", margin: "0 0 4px" }}>
            Shoe mileage isn't in the Garmin FIT export itself, so this is built from what you tell Claude per run. Default retirement target is {SHOE_MAX_MILES} mi.
          </p>
          {shoeMileage.map((s) => {
            const pct = Math.min(100, (s.miles / SHOE_MAX_MILES) * 100);
            return (
              <div key={s.shoe} style={{ background: "var(--surface-1)", borderRadius: 14, padding: "0.9rem 1.1rem" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <p style={{ margin: 0, fontSize: 14, fontWeight: 500 }}>{s.shoe}</p>
                  <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>{s.runs} run{s.runs !== 1 ? "s" : ""}</p>
                </div>
                <div style={{ width: "100%", height: 10, background: "var(--surface-2)", borderRadius: 6, overflow: "hidden", marginBottom: 4 }}>
                  <div style={{ width: pct + "%", height: "100%", background: pct > 90 ? "#A26360" : "#BDD1C5" }} />
                </div>
                <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>{s.miles} of {SHOE_MAX_MILES} mi</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RunningDashboard />);
</script>
</body>
</html>
