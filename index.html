function fmtWeekRange(weekStart) {
  const start = new Date(weekStart + "T12:00:00");
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  const sameMonth = start.getMonth() === end.getMonth();
  const startStr = start.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  const endStr = sameMonth
    ? end.toLocaleDateString("en-US", { day: "numeric" })
    : end.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return startStr + "\u2013" + endStr + ", " + end.getFullYear();
}

function getDefaultWeekStart() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  for (const w of PLAN) {
    const start = new Date(w.weekStart + "T00:00:00");
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    if (today >= start && today <= end) return w.weekStart;
  }
  const started = PLAN.filter((w) => new Date(w.weekStart + "T00:00:00") <= today);
  if (started.length) return started[started.length - 1].weekStart;
  return PLAN[0].weekStart;
}

function getCurrentWeekVA(planVsActualByWeek) {
  const defaultStart = getDefaultWeekStart();
  return planVsActualByWeek.find((w) => w.weekStart === defaultStart) || planVsActualByWeek[planVsActualByWeek.length - 1];
}

function fmtPace(sec) {
  if (sec == null || !isFinite(sec)) return "\u2014";
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return m + ":" + String(s).padStart(2, "0");
}

function fmtDuration(sec) {
  const m = Math.floor(sec / 60);

  return m + ":" + String(s).padStart(2, "0");
}

}

function projectRoute(route, size) {
  if (!route || route.length === 0) return "";
  const lats = route.map((p) => p[0]);
  const lons = route.map((p) => p[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const avgLat = (minLat + maxLat) / 2;
  const cosLat = Math.cos((avgLat * Math.PI) / 180);
  const w = (maxLon - minLon) * cosLat;
  const h = maxLat - minLat;
  const span = Math.max(w, h, 0.0001);
  const pad = size * 0.12;
  const scale = (size - pad * 2) / span;
  const offX = (size - w * scale) / 2;
  const offY = (size - h * scale) / 2;
  return route
    .map((p) => {
      const x = (p[1] - minLon) * cosLat * scale + offX;
      const y = size - ((p[0] - minLat) * scale + offY);
      return x.toFixed(1) + "," + y.toFixed(1);
    })
    .join(" ");
}

function RouteSvg({ route, routeShape, color }) {

        No GPS data
      </div>
    );
  }
  const points = routeShape
    ? routeShape.map((p) => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ")
    : projectRoute(route, 100);
  return (
    <svg viewBox="0 0 100 100" width="100" height="100" style={{ background: "var(--surface-1)", borderRadius: 10 }}>
      <polyline points={points} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={points.split(" ")[0].split(",")[0]} cy={points.split(" ")[0].split(",")[1]} r="2.5" fill={color} />
    </svg>
  );
}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>

          <i className="ti ti-chevron-left" style={{ fontSize: 18 }}></i>
        </button>
        <p style={{ fontSize: 13, fontWeight: 500, margin: 0 }}>{monthLabel}</p>
        <button onClick={() => setMonthDate(new Date(year, month + 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, color: "var(--text-secondary)" }}>
          <i className="ti ti-chevron-right" style={{ fontSize: 18 }}></i>
        </button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
        {["M", "T", "W", "T", "F", "S", "S"].map((d, i) => (
          <div key={i} style={{ textAlign: "center", fontSize: 10, color: "var(--text-secondary)", fontWeight: 500 }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const iso = dayISO(d);
          const run = runForDate(iso);
          const c = run ? TYPE_COLOR[run.type] || TYPE_COLOR.Easy : null;
          return (
            <div
              key={i}
              onClick={run ? () => onDayClick(iso) : undefined}
              title={run ? run.type + ": " + run.distance_mi + " mi (tap to view)" : ""}
              style={{
                aspectRatio: "1",
                borderRadius: 7,
                background: c ? c.solid : "var(--surface-1)",
                color: c ? "#3D3428" : "var(--text-secondary)",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: 11,
                fontWeight: c ? 600 : 400,
                cursor: run ? "pointer" : "default",
              }}
            >
              {d}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12, fontSize: 11, color: "var(--text-secondary)" }}>
        {Object.entries(TYPE_COLOR).filter(([k]) => k !== "Rest").map(([k, v]) => (
          <span key={k} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 9, height: 9, borderRadius: 3, background: v.solid, display: "inline-block" }} />
            {k}
          </span>
        ))}
      </div>
    </div>
  );
}

                      <th style={{ textAlign: "left", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Pace</th>
                      <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Dist</th>
                      <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>HR</th>
                      <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Elevation</th>
                      <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text-secondary)", fontWeight: 500 }}>Cadence</th>

                  </thead>
                  <tbody>
                    {(() => {
                      const paces = r.splits.map((s) => s.pace);
                      const minPace = Math.min(...paces);
                      const maxPace = Math.max(...paces);
                      return r.splits.map((s) => {
                        const barPct = maxPace > minPace ? 100 * (1 - (s.pace - minPace) / (maxPace - minPace)) : 100;
                        const barWidth = Math.max(12, barPct);
                        return (
                          <tr key={s.mile} style={{ borderBottom: "0.5px solid var(--border)" }}>
                            <td style={{ padding: "6px 8px" }}>{s.mile}{s.partial ? " *" : ""}</td>
                            <td style={{ padding: "6px 8px" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <span style={{ minWidth: 44 }}>{fmtPace(s.pace)}</span>
                                <div style={{ flex: 1, minWidth: 40, maxWidth: 90, height: 8, background: "var(--surface-2)", borderRadius: 4, overflow: "hidden" }}>
                                  <div style={{ width: barWidth + "%", height: "100%", background: "#9DAAA2", borderRadius: 4 }} />
                                </div>
                              </div>
                            </td>
                            <td style={{ padding: "6px 8px", textAlign: "right" }}>{s.partial ? s.partial_distance_mi : "1.00"} mi</td>
                            <td style={{ padding: "6px 8px", textAlign: "right" }}>{s.avg_hr ?? "\u2014"}</td>
                            <td style={{ padding: "6px 8px", textAlign: "right" }}>{s.elev_net_ft != null ? (s.elev_net_ft > 0 ? "+" : "") + s.elev_net_ft + " ft" : "\u2014"}</td>
                            <td style={{ padding: "6px 8px", textAlign: "right" }}>{s.avg_cadence ?? "\u2014"}</td>
                            <td style={{ padding: "6px 8px", textAlign: "right" }}>{r.avg_temp_c != null ? cToF(r.avg_temp_c) + "\u00b0F" : "\u2014"}</td>
                          </tr>
                        );
                      });
                    })()}
                  </tbody>
                </table>
                {r.splits.some((s) => s.partial) && (
                  <p style={{ fontSize: 10, color: "var(--text-secondary)", margin: "6px 0 0" }}>* partial mile, pace extrapolated to a per-mile-equivalent</p>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function RunningDashboard() {
  const [tab, setTab] = useState("overview");
  const [selectedWeek, setSelectedWeek] = useState(getDefaultWeekStart());
  const lastRunDate = RUNS[RUNS.length - 1].date;
  const [monthDate, setMonthDate] = useState(new Date(parseInt(lastRunDate.slice(0,4)), parseInt(lastRunDate.slice(5,7))-1, 1));

  const week = useMemo(() => PLAN.find((w) => w.weekStart === selectedWeek), [selectedWeek]);
  const [expanded, setExpanded] = useState({});
  const [activeRunDate, setActiveRunDate] = useState(null);
  const [modalExpanded, setModalExpanded] = useState(false);
  const [runFilter, setRunFilter] = useState("All");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");
  const runTypes = useMemo(() => ["All", ...Array.from(new Set(RUNS.map((r) => r.type)))], []);

  const shoeMileage = useMemo(() => {
    const map = {};
    RUNS.forEach((r) => {
      const shoe = r.shoe || "Unknown";
      if (!map[shoe]) map[shoe] = { miles: 0, runs: 0 };
      map[shoe].miles += r.distance_mi;
      map[shoe].runs += 1;
    });
    (typeof SHOE_ADJUSTMENTS !== "undefined" ? SHOE_ADJUSTMENTS : []).forEach((adj) => {
      if (!map[adj.shoe]) map[adj.shoe] = { miles: 0, runs: 0 };
      map[adj.shoe].miles += adj.miles;
    });
    return Object.entries(map).map(([shoe, v]) => ({ shoe, miles: Math.round(v.miles * 100) / 100, runs: v.runs }));
  }, []);

  const totalMiles = useMemo(() => RUNS.reduce((a, r) => a + r.distance_mi, 0), []);
  const totalTime = useMemo(() => RUNS.reduce((a, r) => a + r.duration_s, 0), []);
  const avgHrOverall = useMemo(() => {
    const vals = RUNS.map((r) => r.avg_hr);
    return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  }, []);

  const typeBreakdown = useMemo(() => {
    const map = {};
    RUNS.forEach((r) => { map[r.type] = (map[r.type] || 0) + r.distance_mi; });
    return Object.entries(map).map(([type, miles]) => ({
      type, miles: Math.round(miles * 100) / 100, color: (TYPE_COLOR[type] || TYPE_COLOR.Easy).solid,
    }));
  }, []);

  const planVsActualByWeek = useMemo(() => {
    return PLAN.map((w) => {
      const plannedTotal = w.days.reduce((a, d) => a + (d.planned ? d.planned.distance : 0), 0);
      const actualTotal = w.days.reduce((a, d) => { const r = runForDate(d.date); return a + (r ? r.distance_mi : 0); }, 0);
      return { weekLabel: w.weekLabel, weekStart: w.weekStart, planned: Math.round(plannedTotal * 100) / 100, actual: Math.round(actualTotal * 100) / 100 };
    });
  }, []);

  const trendsByType = useMemo(() => {
    const map = {};
    RUNS.forEach((r) => {
      if (!map[r.type]) map[r.type] = [];
      const isHill = r.type === "Hill" && r.repeat_avg_pace_sec_per_mi;
      map[r.type].push({
        date: r.date,
        dateLabel: fmtDateShort(r.date),
        pace: isHill ? r.repeat_avg_pace_sec_per_mi : r.duration_s / r.distance_mi,
        hr: isHill ? r.repeat_avg_hr : r.avg_hr,
        distance: r.distance_mi,
        repLength: isHill ? r.repeat_avg_distance_mi : null,
        repTime: isHill ? r.repeat_avg_time_s : null,
        repElev: isHill ? r.repeat_avg_elev_gain_ft : null,
        repCount: isHill ? r.repeat_count : null,
      });
    });
    Object.values(map).forEach((arr) => arr.sort((a, b) => (a.date > b.date ? 1 : -1)));
    return map;
  }, []);

  const tabs = [
    { id: "overview", label: "Overview", icon: "ti-layout-dashboard" },
    { id: "splits", label: "Splits", icon: "ti-chart-bar" },
    { id: "weekly", label: "Weekly plan vs actual", icon: "ti-calendar-stats" },
    { id: "trends", label: "Trends", icon: "ti-trending-up" },
    { id: "gear", label: "Gear", icon: "ti-shoe" },
  ];

  return (
    <div style={{ fontFamily: "var(--font-sans)" }}>
      <style>{RESPONSIVE_CSS}</style>
      <h2 className="sr-only" style={{ position: "absolute", width: 1, height: 1, overflow: "hidden" }}>
        Running training dashboard showing calendar, per-run splits, elevation, cadence, heart rate, weekly plan vs actual, and pace/HR trends by run type.
      </h2>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 20 }}>
        <KpiCard gradient={KPI_GRADIENTS.distance} icon="ti-route" label="Total distance" value={totalMiles.toFixed(2) + " mi"} sub={RUNS.length + " runs logged"} />
        <KpiCard gradient={KPI_GRADIENTS.time} icon="ti-clock" label="Total time" value={Math.floor(totalTime / 60) + " min"} sub={fmtDuration(totalTime / RUNS.length) + " avg /run"} />

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <p style={{ margin: 0, fontSize: 14, fontWeight: 500 }}>{s.shoe}</p>
                  <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>{s.runs} run{s.runs !== 1 ? "s" : ""}</p>
                </div>
                <div style={{ width: "100%", height: 10, background: "var(--surface-2)", borderRadius: 6, overflow: "hidden", marginBottom: 4 }}>
                  <div style={{ width: pct + "%", height: "100%", background: pct > 90 ? "#A26360" : "#BDD1C5" }} />
                </div>
                <p style={{ margin: 0, fontSize: 12, color: "var(--text-secondary)" }}>{s.miles} of {SHOE_MAX_MILES} mi</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RunningDashboard />);
</script>
</body>
</html>
